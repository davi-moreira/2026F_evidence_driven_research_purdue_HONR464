# ---------------------------------------------------------------------------
# The central pedagogical principle and the AI-collaboration discipline.
# ---------------------------------------------------------------------------
ai_policy:
  principle: "AI IS YOUR ARM AND YOUR RESEARCH ASSISTANT — NOT YOUR BRAIN."
  verify_rule: "AI MAY PROPOSE. THE RESEARCHER MUST VERIFY. THE EVIDENCE MUST SUPPORT."
  discipline: "Specify -> Delegate -> Interrogate -> Inspect -> Verify -> Document -> Defend"
  discipline_shorthand: "Ask -> Verify -> Document"   # the student-facing everyday form
  ledger_required: true            # AI Research Ledger entry on every deliverable
  ledger_fields: [task_delegated, tool_used, prompt, output_summary, decision,
                  verification_method, remaining_concern, responsible_researcher]
  never_delegate:                  # decisions that stay human, per the syllabus
    - selecting the research problem and question
    - declaring the research design and target population
    - choosing measurements and evaluating data quality
    - ethical judgments
    - deciding which claims the evidence justifies
    - acknowledging uncertainty and limitations
    - defending the project publicly
  tools:
    primary: "Google Gemini (in and alongside Colab)"
    reviewer_bench: "Purdue GenAI Studio (custom role models + course knowledge base)"
    also_permitted: "Microsoft Copilot (Purdue-provided) and other tools, with disclosure"

# ---------------------------------------------------------------------------
# Flipped classroom: the Student Research Lead (SRL) system.
# ---------------------------------------------------------------------------
srl:
  leadable_lectures: 25            # all Mon/Wed lectures except Week 1 (M1, M2)
  leads_per_student: 5             # 25 slots / 5 students
  first_slot_meeting: 4            # Mon Aug 31 (nb01 Lecture 1)
  model: "Socratic investigation, not summary presentation"
  monday_sections:                 # minutes must sum to 50
    - {name: "Student-led research puzzle", min: 9}
    - {name: "Guided AI research-partner investigation", min: 22}
    - {name: "Human verification + instructor formalization", min: 12}
    - {name: "Decision and defense", min: 7}
  wednesday_sections:
    - {name: "Student-led retrieval and challenge", min: 7}
    - {name: "Intensive applied AI laboratory", min: 23}
    - {name: "Peer defense and adversarial questioning", min: 12}
    - {name: "Transfer to the final project", min: 8}
  friday_sections:
    - {name: "Research stand-up", min: 6}
    - {name: "Milestone kickoff + AI-supported sprint", min: 23}
    - {name: "Peer and AI red-team review", min: 12}
    - {name: "Revision, ledger, submission", min: 9}

# ---------------------------------------------------------------------------
# The inquiry compass (RDSS ch. 7) — the QUESTION-classification layer, taught
# in nb01 and used in every declaration. Research DESIGNS are organized by the
# RDSS design-library pathways (ch. 15–18): inquiry kind × data strategy, with
# prediction as its own answer objective (generalization to unseen cases).
# ---------------------------------------------------------------------------
inquiry_framework:
  kinds:
    descriptive: "asks what the world is or was — no counterfactual contrast required"
    causal: "asks what would differ under an intervention — a counterfactual contrast"
  reaches:
    sample: "the data at hand — the units actually observed"
    population: "a population beyond the data — the units the sampling frame reaches"
    unseen: "cases not yet seen — future or out-of-sample units"
  positions:
    description:
      kind: "descriptive"
      reach: "sample"
      can_establish: "what is observed in the data at hand; patterns, distributions, differences"
      cannot_establish: "reach beyond these units; causal effects"
      taught_in: "nb01 (classification), nb04 (design deep dive)"
    generalization:
      label: "generalization (statistical/observational inference)"
      kind: "descriptive"
      reach: "population"
      can_establish: "estimates about a population with quantified uncertainty, for the frame the sampling design reaches"
      cannot_establish: "a causal effect (association is not causation); reach past the frame"
      taught_in: "nb01 (classification), nb04 (design deep dive)"
    prediction:
      label: "prediction (descriptive inquiries about unseen cases)"
      kind: "descriptive"
      reach: "unseen"
      can_establish: "out-of-sample forecasts for new observations, against a stated baseline + metric"
      cannot_establish: "explanation or causation; performance != understanding"
      taught_in: "nb01 (classification), nb07 (design deep dive)"
      note: "a distinct answer objective — never forced into the descriptive-vs-causal or observational-vs-experimental grids"
    causal:
      label: "causal reasoning"
      kind: "causal"
      reach: "sample or population (identification licenses the kind-crossing; sampling licenses reach)"
      can_establish: "an effect of an intervention under a stated identification argument"
      cannot_establish: "effects when identification assumptions fail or no design supplies leverage"
      taught_in: "nb01 (classification), nb05 + nb08 (design deep dives)"
  crossings:
    sample_to_population:
      license: "a sampling data strategy (RDSS ch. 8) + an uncertainty-bearing answer strategy (ch. 9) + diagnosis (ch. 10)"
      violation: "the silent upgrade"
    observed_to_unseen:
      license: "a prediction-time-honest data strategy (no leakage) + held-out diagnosands + a baseline comparison under redesign"
      violation: "leakage; assuming tomorrow resembles the training data"
    descriptive_to_causal:
      license: "an assignment strategy (RDSS ch. 8, 18) or a defended observational identification argument (ch. 16)"
      violation: "after-therefore-because; design mimicry"
  pathways:                        # the design-library layer (Weeks 5–9)
    observational_descriptive: {week: 5, notebook: "nb04", rdss: "ch. 15", example_designs: "sample surveys, indices, case selection"}
    observational_causal:      {week: 6, notebook: "nb05", rdss: "ch. 16", example_designs: "selection-on-observables, DiD, IV, RDD, natural experiments"}
    experimental_descriptive:  {week: 7, notebook: "nb06", rdss: "ch. 17", example_designs: "audit, list, conjoint experiments; behavioral games; measurement experiments"}
    prediction:                {week: 8, notebook: "nb07", rdss: "course-authored library entry (declare-diagnose-redesign format)", example_designs: "baseline vs model, held-out evaluation, calibration"}
    experimental_causal:       {week: 9, notebook: "nb08", rdss: "ch. 18", example_designs: "two-arm trials, blocking, cluster + factorial designs"}

# The course operating system (declaration→diagnosis→redesign as a student loop).
operating_system:
  workflow: [CURIOSITY, GAP, PROBLEM, QUESTION, COMPASS, MODEL, INQUIRY, MEASUREMENT,
             DATA_STRATEGY, ANSWER_STRATEGY, DECLARATION, DIAGNOSIS, REDESIGN,
             ANALYSIS, CLAIM, COMMUNICATION, REFLECTION, REVISION]
  student_loop: [ASK, DEFINE, CLASSIFY, MATCH, DECLARE, BUILD, DIAGNOSE, REDESIGN,
                 VERIFY, CLAIM, COMMUNICATE, REVISE]
  ai_loop: [SPECIFY, DELEGATE, INTERROGATE, INSPECT, VERIFY, DOCUMENT, DEFEND]

# ---------------------------------------------------------------------------
# Weekly architecture: 16 topics, one notebook per week (nb00–nb15).
# ---------------------------------------------------------------------------
weeks:
  - {week: 1,  notebook: "nb00", lectures: 2, topic: "Research in the age of AI: your arm, your RA — not your brain", milestone: "M0"}
  - {week: 2,  notebook: "nb01", lectures: 2, topic: "From curiosity to a research problem: descriptive, predictive, causal", milestone: "M1"}
  - {week: 3,  notebook: "nb02", lectures: 1, topic: "Research builds on research: verified evidence and real gaps", milestone: "M2"}
  - {week: 4,  notebook: "nb03", lectures: 2, topic: "The anatomy of a research design: MIDA, declaration, diagnosis", milestone: "M3"}
  - {week: 5,  notebook: "nb04", lectures: 2, topic: "Observational descriptive research", milestone: "M4"}
  - {week: 6,  notebook: "nb05", lectures: 2, topic: "Observational causal research", milestone: "M5"}
  - {week: 7,  notebook: "nb06", lectures: 2, topic: "Experimental descriptive research", milestone: "M6"}
  - {week: 8,  notebook: "nb07", lectures: 1, topic: "Prediction", milestone: "M7"}
  - {week: 9,  notebook: "nb08", lectures: 2, topic: "Experimental causal research", milestone: "M8"}
  - {week: 10, notebook: "nb09", lectures: 2, topic: "Share the research and attack the analysis", milestone: "M9"}
  - {week: 11, notebook: "nb10", lectures: 2, topic: "Poster criticism and final poster lock", milestone: "M10"}
  - {week: 12, notebook: "nb11", lectures: 2, topic: "Poster delivery: pitches, uncertainty, difficult questions", milestone: "M11"}
  - {week: 13, notebook: "nb12", lectures: 1, topic: "Final conference preparation, presentation, and reflection", milestone: "M12"}
  - {week: 14, notebook: "nb13", lectures: 0, topic: "Thanksgiving async: replication and red-team", milestone: "M13"}   # async module
  - {week: 15, notebook: "nb14", lectures: 2, topic: "From poster to research note", milestone: "M14"}
  - {week: 16, notebook: "nb15", lectures: 2, topic: "Managing multiple AI agents; the final defense", milestone: "M15"}

