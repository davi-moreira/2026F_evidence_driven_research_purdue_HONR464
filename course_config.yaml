# The cumulative Research Project Dossier (every milestone updates it).
dossier_components:
  - research charter
  - evidence and literature map
  - MIDA design declaration
  - data and measurement documentation
  - reproducible Colab notebook
  - declared analysis protocol
  - claim–evidence table
  - robustness and diagnostic record
  - AI Research Ledger
  - poster and presentation materials
  - replication record
  - research note / chapter
  - AI-agent management portfolio

