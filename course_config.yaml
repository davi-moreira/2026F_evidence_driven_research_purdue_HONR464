# Source-of-truth materials (see planning/SOURCE_AUDIT_V2.md).
sources:
  primary_book:
    key: "RDSS"
    citation: "Blair, Coppock & Humphreys (2023). Research Design in the Social Sciences: Declaration, Diagnosis, and Redesign. Princeton University Press."
    local_root: "_adm/_references/book/"
    r_package: "rdss"           # CRAN v1.0.14, MIT license; wraps DeclareDesign
    license: "MIT"
    library: "https://book.declaredesign.org/library/"   # Weeks 5–9 backbone
  course_book:
    key: "EDR"
    title: "Evidence-Driven Research: How to Design, Analyze, Verify, and Defend Empirical Research"
    format: "Quarto book, 37 chapters in six parts, rendered to docs/book/"
    sync: "chapters synchronized with nb00–nb15 + site (validate_book_sync.py)"
  secondary_book:
    key: "CB"
    citation: "Bergstrom & West (2020). Calling Bullshit: The Art of Skepticism in a Data-Driven World."
    local: false
    use: "optional / parallel; light discussion; public callingbullshit.org where used"
  datasets:            # from rdss / RDSS replication (MIT); shipped as CSV under notebooks/data/
    - bonilla_tillery      # survey experiment → nb06
    - cliningsmith_etal    # natural experiment → nb05
    - foos_etal            # field experiment → nb08
    - la_voter_file        # sampling frame → nb04
    - lapop_brazil         # sample survey → nb04

