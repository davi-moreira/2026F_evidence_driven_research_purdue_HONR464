  meeting_minutes: 50
  modality: "in-person (2 async-online meetings)"
  repo: "davi-moreira/2026F_evidence_driven_research_purdue_HONR464"
  website: "https://davi-moreira.github.io/2026F_evidence_driven_research_purdue_HONR464/"
