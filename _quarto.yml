# IMPORTANT REFERENCE: https://www.youtube.com/watch?v=uimdXPZc40I&list=PLkrJrLs7xfbXcEKhTCKRSr2VXH4yiBeXo&index=4
project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
  resources:
    - "notebooks/data/honr46400_datasets.zip"
  # Encrypt the rendered instructor page (courtesy lock; the private repo +
  # GitHub auth is the real protection). Runs after every `quarto render`.
  post-render: .venv/bin/python scripts/protect_instructor_page.py


website:
  title: "HONR 46400: Evidence-Driven Research (Fall 2026)"
  sidebar:
    background: primary
    logo: "images/honr_464_logo.png"
    pinned: true
    align: center
    tools:
      - icon: github
        href: https://github.com/davi-moreira/2026F_evidence_driven_research_purdue_HONR464
        text: GitHub
    style: docked
    contents:
      - href: index.qmd
        text: Home
      - href: syllabus.qmd
        text: Syllabus
      - href: material.qmd
        text: Material
      - href: book/index.html
        text: Book
      - href: schedule.qmd
        text: Schedule
      - href: instructor.qmd
        text: Instructor

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true

editor: visual
